<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema PYMES</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="login-body">
  <div class="login-box fade-in">
    <!-- Imagen opcional arriba -->
    <img src="img/Icono.png" alt="Logo Sistema PYMES" style="max-width:100px; margin-bottom:15px;">

    <h2>Iniciar Sesión</h2>
    <form id="formLogin">
      <input type="email" id="correo" placeholder="Correo" required>
      <input type="password" id="contraseña" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
    <div id="resultado"></div>
  </div>

  <script>
    document.getElementById("formLogin").addEventListener("submit", e => {
      e.preventDefault();
      const datos = {
        correo: document.getElementById("correo").value,
        contraseña: document.getElementById("contraseña").value
      };

      fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
      })
      .then(res => res.json())
      .then(data => {
        if (data.message === "Login exitoso") {
          // Guardar usuario en localStorage
          localStorage.setItem("usuario", JSON.stringify(data.usuario));
          // Redirigir al dashboard
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("resultado").innerText = "Credenciales incorrectas";
        }
      })
      .catch(err => {
        console.error("Error en login:", err);
        document.getElementById("resultado").innerText = "Error de conexión con el servidor";
      });
    });
  </script>
</body>
</html>
