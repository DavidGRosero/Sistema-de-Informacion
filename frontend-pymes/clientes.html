<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Sistema PYMES</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Sistema de Gestión</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="clientes.html">Clientes</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html">Ventas</a>
        <a href="detalleventa.html">Detalle de Ventas</a>
      </nav>
      <button class="logout" id="logoutBtn">Cerrar Sesión</button>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <h1>Clientes</h1>
        <div class="user-info">
          <span id="userName"></span>
          <span id="userEmail"></span>
        </div>
      </header>

      <!-- Aquí va el contenido específico de cada módulo -->
      <section class="content">
        <h2>Lista de Clientes</h2>
        <form id="formCliente">
          <input type="text" id="nombre" placeholder="Nombre">
          <input type="text" id="contacto" placeholder="Contacto">
          <input type="text" id="direccion" placeholder="Dirección">
          <button type="submit">Agregar Cliente</button>
        </form>

        <table border="1" id="tablaClientes">
          <thead>
            <tr><th>ID</th><th>Nombre</th><th>Contacto</th><th>Dirección</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
  </div>

  <script>
    // Verificar login
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario) {
      alert("Debes iniciar sesión primero");
      window.location.href = "login.html";
    } else {
      document.getElementById("userName").innerText = usuario.nombre;
      document.getElementById("userEmail").innerText = usuario.correo;
    }

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("usuario");
      window.location.href = "login.html";
    });

    // Ejemplo: cargar clientes
    function cargarClientes() {
      fetch("http://localhost:3000/clientes")
        .then(res => res.json())
        .then(data => {
          const tbody = document.querySelector("#tablaClientes tbody");
          tbody.innerHTML = "";
          data.forEach(c => {
            tbody.innerHTML += `<tr>
              <td>${c.id_cliente}</td>
              <td>${c.nombre || ""}</td>
              <td>${c.contacto || ""}</td>
              <td>${c.direccion || ""}</td>
            </tr>`;
          });
        });
    }

    document.getElementById("formCliente").addEventListener("submit", e => {
      e.preventDefault();
      const cliente = {
        nombre: document.getElementById("nombre").value,
        contacto: document.getElementById("contacto").value,
        direccion: document.getElementById("direccion").value
      };
      fetch("http://localhost:3000/clientes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cliente)
      }).then(() => cargarClientes());
    });

    cargarClientes();
  </script>
</body>
</html>
